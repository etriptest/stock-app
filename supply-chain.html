<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產業供應鏈地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f2ed; --card:#fff; --card2:#faf9f6; --bd:#e2ddd5;
  --text:#1a1a1a; --dim:#6b6460; --navy:#1e3a5f;
}
@media(prefers-color-scheme: dark){ :root { --sys-dark:1; } }
[data-theme="dark"] {
  --bg:#111210; --card:#1c1c1a; --card2:#242422; --bd:#333330;
  --text:#e8e6e0; --dim:#888580; --navy:#1a3454;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

.hdr { background:var(--navy); color:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.hdr-title { font-size:18px; font-weight:700; }
.hdr-sub   { font-size:12px; color:#8eabc8; margin-top:2px; }
.back-btn  { font-size:13px; color:#8eabc8; text-decoration:none; display:flex; align-items:center; gap:4px; }
.back-btn:hover { color:#fff; }

.tabs-bar { background:var(--card); border-bottom:1px solid var(--bd); padding:0 16px; display:flex; gap:4px; overflow-x:auto; }
.chain-tab { padding:12px 16px; font-size:14px; font-family:'Noto Sans TC',sans-serif; border:none; background:transparent; color:var(--dim); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:.15s; }
.chain-tab.on { color:var(--navy); border-bottom-color:var(--navy); font-weight:700; }

.W { max-width:1200px; margin:0 auto; padding:16px; }

.legend-bar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; padding:10px 14px; background:var(--card); border:1px solid var(--bd); border-radius:10px; font-size:12px; }
.leg { display:flex; align-items:center; gap:5px; color:var(--dim); }
.leg-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.leg-line-solid { width:20px; height:2px; }
.leg-line-dash  { width:20px; height:2px; background:repeating-linear-gradient(to right,#888 0,#888 4px,transparent 4px,transparent 7px); }

.chain-wrap { background:var(--card); border:1px solid var(--bd); border-radius:14px; overflow:auto; padding:4px; }
.chain-svg  { display:block; min-width:520px; }

.node-card { cursor:pointer; transition:opacity .15s; }
.node-card:hover { opacity:.75; }

.info-panel { background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:16px; margin-top:12px; display:none; }
.info-panel.visible { display:block; animation:fadeIn .25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.info-name { font-size:18px; font-weight:700; margin-bottom:4px; }
.info-code { font-size:13px; color:var(--dim); margin-bottom:10px; }
.info-desc { font-size:14px; line-height:1.8; color:var(--text); margin-bottom:12px; }
.info-role { display:inline-block; font-size:12px; padding:3px 10px; border-radius:20px; background:#f0ede5; color:var(--dim); margin-bottom:10px; }
.query-btn { display:inline-block; padding:9px 20px; background:var(--navy); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; font-family:'Noto Sans TC',sans-serif; cursor:pointer; text-decoration:none; transition:.15s; }
.query-btn:hover { background:#2a4f7a; }

@media(max-width:480px){ .hdr-title{font-size:16px} }
</style>
</head>

// ── 顏色 ──────────────────────────────────────────────────────
function getColors() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  return dark ? {
    teal:   { fill:'#0d2e22', stroke:'#1d6b4a', text:'#7dd4b0' },
    purple: { fill:'#1a1730', stroke:'#6b63c8', text:'#b0aaf0' },
    coral:  { fill:'#2a1208', stroke:'#b04020', text:'#e8907a' },
    amber:  { fill:'#261a04', stroke:'#c07010', text:'#e8b060' },
    gray:   { fill:'#1e1e1c', stroke:'#555550', text:'#b0aea8' },
    blue:   { fill:'#0a1e32', stroke:'#2060a0', text:'#80b8e8' },
  } : {
    teal:   { fill:'#E1F5EE', stroke:'#5DCAA5', text:'#085041' },
    purple: { fill:'#EEEDFE', stroke:'#534AB7', text:'#26215C' },
    coral:  { fill:'#FAECE7', stroke:'#D85A30', text:'#4A1B0C' },
    amber:  { fill:'#FAEEDA', stroke:'#EF9F27', text:'#412402' },
    gray:   { fill:'#F1EFE8', stroke:'#888780', text:'#2C2C2A' },
    blue:   { fill:'#E6F1FB', stroke:'#378ADD', text:'#042C53' },
  };
}

// ── 計算節點中心 ────────────────────────────────────────────────
function nodeCenter(n) {
  return { cx: n.x + n.w / 2, cy: n.y + 26 };
}

// ── 算箭頭端點（從一個矩形邊緣到另一個） ──────────────────────
function edgePoints(from, to) {
  const fc = nodeCenter(from), tc = nodeCenter(to);
  const dx = tc.cx - fc.cx, dy = tc.cy - fc.cy;
  // 出發點：下邊中心
  const sx = fc.cx, sy = from.y + 52;
  // 終點：上邊中心
  const ex = tc.cx, ey = to.y;
  return { sx, sy, ex, ey };
}

// ── 繪製供應鏈 ─────────────────────────────────────────────────
let currentChain = 'semicon';

function renderChain(chainKey) {
  currentChain = chainKey;
  const chain = CHAINS[chainKey];
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const COLORS  = getColors();
  const svg   = document.getElementById('chain-svg');
  const nodeMap = {};
  chain.nodes.forEach(n => nodeMap[n.id] = n);

  // 計算最大 y（決定 viewBox 高度）
  const maxY = Math.max(...chain.nodes.map(n => n.y + 52)) + 40;
  const maxX = Math.max(...chain.nodes.map(n => n.x + n.w)) + 20;
  svg.setAttribute('viewBox', `0 0 ${Math.max(maxX, 760)} ${maxY}`);

  let html = `<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  // 層級標題
  chain.tiers.forEach(t => {
    html += `<text x="16" y="${t.y + 14}" font-size="10" font-weight="500" fill="#888" font-family="sans-serif" letter-spacing=".5">${t.label}</text>`;
  });

  // 連接線
  const edgeColor = isDark ? '#444440' : '#C8C4BB';
  chain.edges.forEach(e => {
    const from = nodeMap[e.from], to = nodeMap[e.to];
    if (!from || !to) return;
    const { sx, sy, ex, ey } = edgePoints(from, to);
    const midY = (sy + ey) / 2;
    const d    = `M${sx} ${sy} C${sx} ${midY} ${ex} ${midY} ${ex} ${ey}`;
    html += `<path d="${d}" fill="none" stroke="${edgeColor}" stroke-width=".8"${e.dash ? ' stroke-dasharray="5,3"' : ''} marker-end="url(#arr)"/>`;
  });

  // 節點
  chain.nodes.forEach(n => {
    const c = COLORS[n.color] || COLORS.gray;
    html += `
      <g class="node-card" onclick="showInfo('${n.id}','${chainKey}')">
        <rect x="${n.x}" y="${n.y}" width="${n.w}" height="52" rx="8"
          fill="${c.fill}" stroke="${c.stroke}" stroke-width=".8"/>
        <text x="${n.x + n.w/2}" y="${n.y + 18}" text-anchor="middle"
          font-size="13" font-weight="500" fill="${c.text}" font-family="sans-serif">${n.label}</text>
        <text x="${n.x + n.w/2}" y="${n.y + 36}" text-anchor="middle"
          font-size="10" fill="${c.text}" font-family="sans-serif" opacity=".8">${n.sub}</text>
      </g>`;
  });

  svg.innerHTML = html;
  document.getElementById('info-panel').classList.remove('visible');
}

function showInfo(nodeId, chainKey) {
  const chain = CHAINS[chainKey];
  const n     = chain.nodes.find(x => x.id === nodeId);
  if (!n) return;
  document.getElementById('info-role').textContent = n.role;
  document.getElementById('info-name').textContent = n.label;
  document.getElementById('info-code').textContent = `代號：${n.code}`;
  document.getElementById('info-desc').textContent = n.desc;
  const btn = document.getElementById('info-btn');
  btn.textContent = `查詢 ${n.label} (${n.code}) →`;
  btn.onclick = (e) => {
    e.preventDefault();
    window.location.href = `/?autoq=${encodeURIComponent(n.code)}`;
  };
  btn.href = `/?autoq=${encodeURIComponent(n.code)}`;
  document.getElementById('info-panel').classList.add('visible');
  document.getElementById('info-panel').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function showChain(key, el) {
  document.querySelectorAll('.chain-tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  renderChain(key);
}

// 初始載入
renderChain('semicon');

<button id="theme-btn" onclick="toggleTheme()" title="切換深色/淺色模式" style="

  width:36px; height:36px; border-radius:50%;

  cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center;

" aria-label="切換深色模式">🌙</button>

<script>
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  const btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}
function toggleTheme() {
  const isDarkNow = document.documentElement.getAttribute('data-theme') === 'dark';
  applyTheme(!isDarkNow);
  // 重新繪製供應鏈（顏色需要更新）
  renderChain(currentChain);
}
(function(){
  const saved = localStorage.getItem('theme');
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ? saved === 'dark' : sysDark);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if(!localStorage.getItem('theme')) applyTheme(e.matches);
  });
})();
</script>
