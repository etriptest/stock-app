<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>股票查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee; --card: #fff; --border: #e0dbd0;
    --text: #1a1a1a; --dim: #666;
    --up: #c0392b; --dn: #1a6b3c;
    --up-bg: #fef0ee; --dn-bg: #eef6f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 18px; min-height: 100vh; padding-bottom: 40px; }

  .header { background: #2c3e50; color: #fff; padding: 18px 20px; text-align: center; }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
  .header p  { font-size: 14px; color: #aab; margin-top: 4px; }

  .wrap { max-width: 680px; margin: 0 auto; padding: 0 16px; }

  .search-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-top: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
  .search-label { font-size: 16px; color: var(--dim); margin-bottom: 12px; }
  .search-row { display: flex; gap: 10px; }
  .search-input { flex: 1; font-size: 22px; font-family: 'Noto Sans TC', sans-serif; padding: 14px 18px; border: 2px solid var(--border); border-radius: 12px; background: #fafaf8; color: var(--text); outline: none; transition: border-color .2s; letter-spacing: 2px; }
  .search-input:focus { border-color: #2c3e50; }
  .search-input::placeholder { color: #bbb; font-size: 18px; letter-spacing: 0; }
  .btn-search { padding: 14px 24px; font-size: 20px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; background: #2c3e50; color: #fff; border: none; border-radius: 12px; cursor: pointer; transition: background .2s, transform .1s; white-space: nowrap; }
  .btn-search:hover { background: #3d5166; }
  .btn-search:active { transform: scale(.97); }
  .btn-search:disabled { background: #aaa; cursor: not-allowed; }

  .quick-label { font-size: 14px; color: var(--dim); margin: 14px 0 8px; }
  .quick-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 30px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; background: #fafaf8; color: var(--text); cursor: pointer; transition: all .15s; }
  .quick-btn:hover { background: #2c3e50; color: #fff; border-color: #2c3e50; }

  .loading { display: none; text-align: center; padding: 32px; font-size: 18px; color: var(--dim); }
  .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: #2c3e50; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { display: none; background: #fef0ee; border: 1px solid #f5c6c0; border-radius: 12px; padding: 16px 20px; margin-top: 20px; font-size: 17px; color: #c0392b; text-align: center; }

  .result { display: none; margin-top: 24px; }

  .price-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 16px; }
  .stock-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .stock-name { font-size: 26px; font-weight: 700; }
  .stock-code { font-size: 16px; color: var(--dim); background: #f0ede5; padding: 3px 10px; border-radius: 20px; }
  .stock-ex   { font-size: 13px; color: var(--dim); }

  .price-main { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; }
  .price-num  { font-size: 58px; font-weight: 700; line-height: 1; }
  .price-num.up { color: var(--up); } .price-num.dn { color: var(--dn); }
  .price-chg  { font-size: 22px; font-weight: 500; }
  .price-chg.up { color: var(--up); } .price-chg.dn { color: var(--dn); }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .stat { background: #fafaf8; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; text-align: center; }
  .stat-label { font-size: 13px; color: var(--dim); margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 500; }

  .ind-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
  .ind-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
  .ind-label { font-size: 13px; color: var(--dim); margin-bottom: 5px; }
  .ind-value { font-size: 20px; font-weight: 700; }
  .ind-value.up { color: var(--up); } .ind-value.dn { color: var(--dn); } .ind-value.neu { color: #555; }
  .ind-sub   { font-size: 13px; color: var(--dim); margin-top: 3px; }

  .analysis-card { border-radius: 16px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(0,0,0,.06); margin-bottom: 16px; }
  .analysis-card.up  { background: var(--up-bg); border: 1px solid #f5c6c0; }
  .analysis-card.dn  { background: var(--dn-bg); border: 1px solid #b8ddc8; }
  .analysis-card.neu { background: var(--bg);    border: 1px solid var(--border); }
  .sig-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .sig-icon  { font-size: 32px; }
  .sig-title { font-size: 22px; font-weight: 700; }
  .sig-title.up { color: var(--up); } .sig-title.dn { color: var(--dn); } .sig-title.neu { color: #555; }
  .sig-body  { font-size: 17px; line-height: 1.85; }
  .sig-body p { margin-bottom: 10px; }
  .sig-body p:last-child { margin-bottom: 0; }

  .disclaimer { background: #fef9ec; border: 1px solid #f0e4a8; border-radius: 12px; padding: 14px 18px; font-size: 14px; color: #7a6010; line-height: 1.7; text-align: center; }

  .section-title { font-size: 16px; color: var(--dim); margin: 28px 0 12px; font-weight: 500; letter-spacing: 1px; }
  .watch-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
  .watch-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; cursor: pointer; transition: box-shadow .2s, border-color .2s; box-shadow: 0 1px 6px rgba(0,0,0,.04); }
  .watch-card:hover { border-color: #2c3e50; box-shadow: 0 3px 14px rgba(0,0,0,.1); }
  .wc-name  { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
  .wc-code  { font-size: 13px; color: var(--dim); margin-bottom: 10px; }
  .wc-price { font-size: 26px; font-weight: 700; line-height: 1.1; }
  .wc-price.up { color: var(--up); } .wc-price.dn { color: var(--dn); }
  .wc-chg   { font-size: 14px; margin-top: 3px; }
  .wc-chg.up { color: var(--up); } .wc-chg.dn { color: var(--dn); }
  .wc-skel  { height: 42px; background: linear-gradient(90deg,#f0ede5 25%,#e8e4da 50%,#f0ede5 75%); background-size: 200% 100%; animation: shim 1.5s infinite; border-radius: 6px; margin-top: 8px; }
  @keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  @media(max-width:480px){
    .price-num{font-size:48px}
    .stats-grid{grid-template-columns:repeat(2,1fr)}
    .btn-search{padding:14px 18px;font-size:18px}
  }
</style>
</head>
<body>

<div class="header">
  <h1>📈 股票查詢</h1>
  <p>台灣證交所即時資料 · 簡單好用</p>
</div>

<div class="wrap">

  <div class="search-card">
    <div class="search-label">輸入股票代號查詢</div>
    <div class="search-row">
      <input class="search-input" id="inp" type="text" inputmode="numeric"
             placeholder="例如：2330" maxlength="6" />
      <button class="btn-search" id="sbtn" onclick="doSearch()">查詢</button>
    </div>
    <div class="quick-label">常用個股</div>
    <div class="quick-row" id="quick-row"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    正在查詢中，請稍候…
  </div>

  <div class="error-box" id="errbox"></div>

  <div class="result" id="result">
    <div class="price-card" id="price-card"></div>
    <div class="ind-grid"   id="ind-grid"></div>
    <div class="analysis-card neu" id="analysis-card">
      <div class="sig-header">
        <div class="sig-icon" id="sig-icon">🔍</div>
        <div class="sig-title neu" id="sig-title">AI 解讀走勢中…</div>
      </div>
      <div class="sig-body" id="sig-body">
        <div class="wc-skel" style="margin-bottom:8px"></div>
        <div class="wc-skel" style="width:70%"></div>
      </div>
    </div>
    <div class="disclaimer">
      ⚠️ 資料來源：台灣證交所，盤中約延遲 5 分鐘。<br>
      技術分析僅供參考，不構成投資建議，請自行判斷。
    </div>
  </div>

  <div class="section-title">熱門個股</div>
  <div class="watch-grid" id="watch-grid"></div>

</div>

<script>
const WATCH = [
  {c:'2330',n:'台積電'},{c:'2317',n:'鴻海'},
  {c:'2454',n:'聯發科'},{c:'0050',n:'元大台灣50'},
  {c:'2382',n:'廣達'}, {c:'2412',n:'中華電'},
];
const QUICK = [
  {c:'2330',n:'台積電'},{c:'2317',n:'鴻海'},{c:'2454',n:'聯發科'},
  {c:'0050',n:'台灣50'},{c:'0056',n:'高股息'},{c:'2308',n:'台達電'},
];

// Quick buttons
const qr = document.getElementById('quick-row');
QUICK.forEach(q => {
  const b = document.createElement('button');
  b.className = 'quick-btn';
  b.textContent = q.c + ' ' + q.n;
  b.onclick = () => { document.getElementById('inp').value = q.c; doSearch(); };
  qr.appendChild(b);
});

// Watchlist skeletons
const wg = document.getElementById('watch-grid');
WATCH.forEach(w => {
  const d = document.createElement('div');
  d.className = 'watch-card'; d.id = 'wc-' + w.c;
  d.onclick = () => { document.getElementById('inp').value = w.c; doSearch(); };
  d.innerHTML = `<div class="wc-name">${w.n}</div><div class="wc-code">${w.c}</div><div class="wc-skel"></div>`;
  wg.appendChild(d);
});

// Tech indicators math
function calcRSI(c, p=14) {
  if (c.length < p+1) return null;
  let g=0,l=0;
  for (let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l+=Math.abs(d);}
  let ag=g/p,al=l/p;
  for (let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?Math.abs(d):0))/p;}
  return al===0?100:+(100-100/(1+ag/al)).toFixed(1);
}
function calcKD(h,l,c,p=9){
  if(c.length<p)return{k:50,d:50};
  let k=50,d=50;
  for(let i=p-1;i<c.length;i++){
    const sh=h.slice(i-p+1,i+1),sl=l.slice(i-p+1,i+1);
    const hh=Math.max(...sh),ll=Math.min(...sl);
    const rsv=hh===ll?50:((c[i]-ll)/(hh-ll))*100;
    k=(2/3)*k+(1/3)*rsv;d=(2/3)*d+(1/3)*k;
  }
  return{k:+k.toFixed(1),d:+d.toFixed(1)};
}
function ema(arr,p){const k=2/(p+1);let e=arr[0];for(let i=1;i<arr.length;i++)e=arr[i]*k+e*(1-k);return e;}
function maAvg(arr,p){const s=arr.slice(-p);return+(s.reduce((a,b)=>a+b,0)/s.length).toFixed(1);}

async function doSearch(code) {
  const inp = document.getElementById('inp');
  const sn  = (code || inp.value).replace(/\s/g,'');
  if (!sn) return;
  inp.value = sn;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display  = 'none';
  document.getElementById('errbox').style.display  = 'none';
  document.getElementById('sbtn').disabled = true;

  try {
    const [qRes, hRes] = await Promise.all([
      fetch(`/api/quote/${sn}`),
      fetch(`/api/history/${sn}`)
    ]);
    const q = await qRes.json();
    if (!q.ok) throw new Error(q.error || '查詢失敗');
    const hData = await hRes.json();
    const rows   = hData.data || [];
    const closes = rows.map(r=>r.close);
    const highs  = rows.map(r=>r.high);
    const lows   = rows.map(r=>r.low);
    const vols   = rows.map(r=>r.volume);

    const allC = [...closes, q.price];
    const allH = [...highs,  q.high||q.price];
    const allL = [...lows,   q.low||q.price];

    const rsiVal  = calcRSI(allC) || '–';
    const {k,d}   = calcKD(allH,allL,allC);
    const ma5v    = maAvg(allC,5);
    const ma20v   = maAvg(allC,20);
    const macdVal = allC.length>=26 ? +(ema(allC,12)-ema(allC,26)).toFixed(2) : 0;
    const avgVol  = vols.slice(-20).reduce((a,b)=>a+b,0)/Math.max(1,vols.slice(-20).length);
    const volR    = avgVol>0 ? +(q.volume/avgVol).toFixed(1) : '–';
    const h52=Math.max(...allC), l52=Math.min(...allC);
    const pos52=+((( q.price-l52)/(h52-l52))*100).toFixed(0);

    const up = q.changePct>0, dn = q.changePct<0;
    const cls = up?'up':dn?'dn':'neu';
    const arrow = up?'▲':dn?'▼':'–';

    // Price card
    document.getElementById('price-card').innerHTML=`
      <div class="stock-meta">
        <div class="stock-name">${q.name}</div>
        <div class="stock-code">${q.code}</div>
        <div class="stock-ex">${q.exchange}</div>
      </div>
      <div class="price-main">
        <div class="price-num ${cls}">${q.price.toLocaleString()}</div>
        <div>
          <div class="price-chg ${cls}">${arrow} ${Math.abs(q.change).toFixed(2)} 元</div>
          <div class="price-chg ${cls}">(${q.changePct>0?'+':''}${q.changePct}%)</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-label">開盤</div><div class="stat-value">${q.open||'–'}</div></div>
        <div class="stat"><div class="stat-label">最高</div><div class="stat-value" style="color:var(--up)">${q.high||'–'}</div></div>
        <div class="stat"><div class="stat-label">最低</div><div class="stat-value" style="color:var(--dn)">${q.low||'–'}</div></div>
        <div class="stat"><div class="stat-label">昨收</div><div class="stat-value">${q.prev||'–'}</div></div>
        <div class="stat"><div class="stat-label">成交量</div><div class="stat-value">${q.volume.toLocaleString()} 張</div></div>
        <div class="stat"><div class="stat-label">量比</div><div class="stat-value" style="color:${volR>1.5?'var(--up)':volR<0.7?'var(--dn)':'inherit'}">${volR}x</div></div>
      </div>`;

    // Indicators
    const maSt = q.price>ma5v&&q.price>ma20v?{t:'多頭排列',c:'up'}:q.price<ma5v&&q.price<ma20v?{t:'空頭排列',c:'dn'}:{t:'均線糾結',c:'neu'};
    const rsiSt = rsiVal>70?{t:'超買區',c:'up'}:rsiVal<30?{t:'超賣區',c:'dn'}:{t:'正常',c:'neu'};
    const kdSt  = k>80?{t:'高檔鈍化',c:'up'}:k<20?{t:'低檔超賣',c:'dn'}:k>d?{t:'黃金交叉',c:'up'}:{t:'死亡交叉',c:'dn'};
    document.getElementById('ind-grid').innerHTML=`
      <div class="ind-card"><div class="ind-label">RSI（14日）</div><div class="ind-value ${rsiSt.c}">${rsiVal}</div><div class="ind-sub">${rsiSt.t}</div></div>
      <div class="ind-card"><div class="ind-label">KD 指標</div><div class="ind-value ${kdSt.c}">K${k} / D${d}</div><div class="ind-sub">${kdSt.t}</div></div>
      <div class="ind-card"><div class="ind-label">MACD</div><div class="ind-value ${macdVal>0?'up':'dn'}">${macdVal>0?'多方動能':'空方動能'}</div><div class="ind-sub">${macdVal>0?'+':''}${macdVal}</div></div>
      <div class="ind-card"><div class="ind-label">均線狀態</div><div class="ind-value ${maSt.c}">${maSt.t}</div><div class="ind-sub">MA5: ${ma5v} ／ MA20: ${ma20v}</div></div>`;

    document.getElementById('loading').style.display='none';
    document.getElementById('result').style.display='block';

    // AI analysis (non-blocking)
    fetchAI(q, {rsiVal,k,d,macdVal,maSt:maSt.t,ma5v,ma20v,volR,pos52});

  } catch(e) {
    document.getElementById('loading').style.display='none';
    const eb=document.getElementById('errbox');
    eb.textContent='❌ '+e.message;
    eb.style.display='block';
  } finally {
    document.getElementById('sbtn').disabled=false;
  }
}

async function fetchAI(q, ind) {
  const up=q.changePct>0,dn=q.changePct<0;
  const cls=up?'up':dn?'dn':'neu';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001', max_tokens:500,
        system:`你是股票技術分析師，用白話文幫助長輩理解走勢。字簡單、有比喻、不超過120字。絕不給買賣建議。只輸出純JSON：{"signal":"UP或DOWN或FLAT","icon":"一個表情","title":"標題10字內","body":"三段說明每段一句用換行分隔"}`,
        messages:[{role:'user',content:`${q.name}(${q.code})今日${up?'漲':'跌'}${Math.abs(q.changePct)}%，RSI=${ind.rsiVal}，KD K${ind.k}/D${ind.d}，MACD${ind.macdVal>0?'正':'負'}，均線${ind.maSt}，量比${ind.volR}倍，近3月位置${ind.pos52}%，請分析。`}]
      })
    });
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=text.match(/\{[\s\S]*?\}/);
    if(!m) throw new Error('parse');
    const ai=JSON.parse(m[0]);
    const s={UP:{c:'up'},DOWN:{c:'dn'},FLAT:{c:'neu'}}[ai.signal]||{c:'neu'};
    const ac=document.getElementById('analysis-card');
    ac.className='analysis-card '+s.c;
    document.getElementById('sig-icon').textContent=ai.icon||(up?'📈':dn?'📉':'📊');
    const st=document.getElementById('sig-title');
    st.textContent=ai.title||'走勢分析';
    st.className='sig-title '+s.c;
    document.getElementById('sig-body').innerHTML=(ai.body||'').split('\n').filter(Boolean).map(p=>`<p>${p}</p>`).join('');
  } catch(_) {
    const up2=q.changePct>0,dn2=q.changePct<0;
    const c2=up2?'up':dn2?'dn':'neu';
    document.getElementById('analysis-card').className='analysis-card '+c2;
    document.getElementById('sig-icon').textContent=up2?'📈':dn2?'📉':'📊';
    const st=document.getElementById('sig-title');
    st.textContent=up2?'今日走勢偏強':dn2?'今日走勢偏弱':'今日小幅震盪';
    st.className='sig-title '+c2;
    document.getElementById('sig-body').innerHTML=
      `<p>今日${up2?'上漲':'下跌'} ${Math.abs(q.changePct)}%，${ind.maSt}。</p>
       <p>RSI ${ind.rsiVal}${ind.rsiVal>70?'，目前在超買區，注意風險':ind.rsiVal<30?'，目前在超賣區，跌勢可能減緩':'，位於正常區間'}。</p>
       <p>成交量是平常的 ${ind.volR} 倍，${ind.volR>1.5?'量能明顯放大，資金關注度高':'量能正常'}。</p>`;
  }
}

// Load watchlist
(async()=>{
  try{
    const codes=WATCH.map(w=>w.c).join(',');
    const res=await fetch(`/api/multi?stocks=${codes}`);
    const data=await res.json();
    if(!data.ok)return;
    data.data.forEach(q=>{
      const el=document.getElementById('wc-'+q.code);
      if(!el)return;
      const up=q.changePct>0,dn=q.changePct<0;
      const cls=up?'up':dn?'dn':'neu';
      el.querySelector('.wc-skel').outerHTML=
        `<div class="wc-price ${cls}">${q.price.toLocaleString()}</div>
         <div class="wc-chg ${cls}">${up?'▲':'▼'} ${up?'+':''}${q.changePct}%</div>`;
    });
  }catch(_){}
})();

document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
</script>
</body>
</html>
