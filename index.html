<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>股票查詢</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #f4f2ed;
  --card:  #ffffff;
  --card2: #faf9f6;
  --bd:    #e2ddd5;
  --text:  #1a1a1a;
  --dim:   #6b6460;
  --navy:  #1e3a5f;
  --navy2: #2a4f7a;
  --neu-bg:#f7f6f2;
  /* 台股：紅漲綠跌 */
  --tw-up: #d0021b;
  --tw-dn: #007a3d;
  /* 美股：綠漲紅跌 */
  --us-up: #007a3d;
  --us-dn: #d0021b;
  /* 當前市場顏色（預設台股） */
  --up:    #d0021b;
  --dn:    #007a3d;
  --up-bg: #fff0f0;
  --dn-bg: #f0faf4;
}
body.us {
  --up:    #007a3d;
  --dn:    #d0021b;
  --up-bg: #f0faf4;
  --dn-bg: #fff0f0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; overflow-x: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; padding-bottom: 48px; }

/* Header */
.hdr { background: var(--navy); color: #fff; padding: 14px 16px; }
.hdr-row { display: flex; align-items: center; justify-content: space-between; }
.hdr-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
.hdr-sub   { font-size: 12px; color: #8eabc8; margin-top: 3px; }
.hdr-right { text-align: right; flex-shrink: 0; }
.hdr-time  { font-size: 14px; color: #cbd8e8; font-weight: 500; }
.mkt-badge { font-size: 11px; color: #8eabc8; margin-top: 3px; min-height: 16px; }

/* Wrap */
.W { width: 100%; max-width: 640px; margin: 0 auto; padding: 0 12px; }

/* Search card */
.s-card { background: var(--card); border: 1px solid var(--bd); border-radius: 14px; padding: 14px; margin-top: 14px; box-shadow: 0 1px 8px rgba(0,0,0,.06); }
.s-label { font-size: 13px; color: var(--dim); margin-bottom: 9px; }
.s-row   { display: flex; gap: 8px; align-items: stretch; }
.s-wrap  { flex: 1; min-width: 0; position: relative; }
.s-inp   { display: block; width: 100%; font-size: 18px; font-family: 'Noto Sans TC', sans-serif; padding: 11px 12px; border: 2px solid var(--bd); border-radius: 10px; background: var(--card2); color: var(--text); outline: none; transition: border-color .2s; }
.s-inp:focus { border-color: var(--navy); }
.s-inp::placeholder { color: #bbb; font-size: 15px; }
.s-btn  { flex-shrink: 0; width: 72px; font-size: 16px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; background: var(--navy); color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: background .2s; }
.s-btn:hover    { background: var(--navy2); }
.s-btn:disabled { background: #aaa; cursor: not-allowed; }

/* Dropdown */
.dd { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--card); border: 1px solid var(--bd); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.12); z-index: 200; overflow: hidden; }
.dd-item { padding: 11px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0ede5; transition: background .1s; }
.dd-item:last-child { border-bottom: none; }
.dd-item:active { background: var(--card2); }
.dd-name { font-size: 15px; font-weight: 700; }
.dd-code { font-size: 12px; color: var(--dim); margin-top: 1px; }
.dd-tag  { font-size: 11px; padding: 2px 8px; border-radius: 10px; flex-shrink: 0; margin-left: 8px; }
.dd-tag.tw { background: #f0ede5; color: #6b6460; }
.dd-tag.us { background: #e8f0f8; color: #1a6b9a; }

/* Quick pills */
.q-label { font-size: 12px; color: var(--dim); margin: 11px 0 7px; }
.q-row   { display: flex; flex-wrap: wrap; gap: 6px; }
.q-btn   { padding: 6px 12px; border: 1px solid var(--bd); border-radius: 20px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; background: var(--card2); color: var(--text); cursor: pointer; white-space: nowrap; }
.q-btn:active { background: var(--navy); color: #fff; border-color: var(--navy); }

/* Loading */
.loading { display: none; text-align: center; padding: 28px 16px; font-size: 16px; color: var(--dim); }
.spinner { width: 34px; height: 34px; border: 3px solid #ddd; border-top-color: var(--navy); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.err-box { display: none; background: #fff0f0; border: 1px solid #f5c0c0; border-radius: 12px; padding: 12px 16px; margin-top: 14px; font-size: 15px; color: #d0021b; text-align: center; }

/* Result */
.result { display: none; margin-top: 14px; }

/* Price card */
.p-card { background: var(--card); border: 1px solid var(--bd); border-radius: 14px; padding: 16px; box-shadow: 0 1px 8px rgba(0,0,0,.06); margin-bottom: 10px; }
.p-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.p-name { font-size: 22px; font-weight: 700; }
.p-code { font-size: 13px; color: var(--dim); background: var(--card2); border: 1px solid var(--bd); padding: 2px 9px; border-radius: 20px; }
.p-ex   { font-size: 12px; color: var(--dim); }
.p-main { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.p-num  { font-size: 50px; font-weight: 700; line-height: 1; }
.p-num.up { color: var(--up); } .p-num.dn { color: var(--dn); } .p-num.neu { color: var(--text); }
.p-chg  { font-size: 18px; font-weight: 500; line-height: 1.4; }
.p-chg.up { color: var(--up); } .p-chg.dn { color: var(--dn); }
.p-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
.p-cell { background: var(--card2); border: 1px solid var(--bd); border-radius: 9px; padding: 7px 10px; text-align: center; }
.p-cl   { font-size: 11px; color: var(--dim); margin-bottom: 3px; }
.p-cv   { font-size: 15px; font-weight: 500; }

/* Lights */
.sec-t  { font-size: 12px; font-weight: 700; color: var(--dim); letter-spacing: 1.5px; text-transform: uppercase; margin: 16px 0 9px; }
.lights { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.l-row  { background: var(--card); border: 1px solid var(--bd); border-radius: 12px; padding: 11px 13px; display: flex; align-items: center; gap: 11px; }
.l-dot  { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.l-lbl  { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
.l-txt  { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text); }

/* Analysis */
.a-card { border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.a-card.up  { background: var(--up-bg); border: 1px solid #f5c0c0; }
.a-card.dn  { background: var(--dn-bg); border: 1px solid #a8d9bc; }
.a-card.neu { background: var(--neu-bg); border: 1px solid var(--bd); }
.a-hdr { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
.a-ico { font-size: 28px; }
.a-ttl { font-size: 19px; font-weight: 700; }
.a-ttl.up { color: var(--up); } .a-ttl.dn { color: var(--dn); } .a-ttl.neu { color: #444; }
.a-bdy { font-size: 15px; line-height: 1.85; }
.a-bdy p { margin-bottom: 7px; }
.a-bdy p:last-child { margin-bottom: 0; }

/* Tip */
.tip { background: #fffbec; border: 1px solid #edd98a; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; font-size: 14px; line-height: 1.8; color: #5a4500; display: none; }
.tip strong { color: #b07800; }

/* Pattern box */
.pat-card { border-radius: 14px; padding: 15px; margin-bottom: 10px; border: 1px solid; }
.pat-card.bull { background: #fff0f0; border-color: #f5c0c0; }
.pat-card.bear { background: #f0faf4; border-color: #a8d9bc; }
.pat-card.neut { background: #f7f6f2; border-color: #e2ddd5; }
.pat-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.pat-name.bull { color: #d0021b; }
.pat-name.bear { color: #007a3d; }
.pat-name.neut { color: #444; }
.pat-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.pat-tag.bull { background: #ffd6d6; color: #d0021b; }
.pat-tag.bear { background: #c8ead8; color: #007a3d; }
.pat-tag.neut { background: #e8e5de; color: #666; }
.pat-desc { font-size: 14px; line-height: 1.8; color: #1a1a1a; }
.pat-warn { font-size: 13px; color: #7a6010; background: #fffbec; border-radius: 8px; padding: 8px 10px; margin-top: 8px; }
.pat-none { background: var(--card); border: 1px solid var(--bd); border-radius: 12px; padding: 13px 15px; font-size: 14px; color: var(--dim); }
.disc { background: var(--card2); border: 1px solid var(--bd); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #999; line-height: 1.7; text-align: center; }

/* Watchlist */
.w-hdr { display: flex; align-items: center; justify-content: space-between; margin: 20px 0 6px; }
.w-title { font-size: 15px; font-weight: 700; }
.w-sub   { font-size: 12px; color: var(--dim); }
/* Color legend - compact two items */
.legend { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--dim); }
.leg-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.leg-sep  { width: 1px; height: 14px; background: var(--bd); }

.w-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.w-card { background: var(--card); border: 1px solid var(--bd); border-radius: 13px; padding: 13px 12px; cursor: pointer; transition: border-color .15s; }
.w-card:active { border-color: var(--navy); background: var(--card2); }
.w-name  { font-size: 14px; font-weight: 700; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.w-code  { font-size: 11px; color: var(--dim); margin-bottom: 8px; }
.w-price { font-size: 22px; font-weight: 700; line-height: 1.1; }
.w-chg   { font-size: 12px; font-weight: 500; margin-top: 2px; }
.w-skel  { height: 40px; background: linear-gradient(90deg, var(--card2) 25%, var(--bd) 50%, var(--card2) 75%); background-size: 200% 100%; animation: shim 1.4s infinite; border-radius: 7px; margin-top: 6px; }
@keyframes shim { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Section divider */
.sec-div { height: 1px; background: var(--bd); margin: 18px 0; }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div>
      <div class="hdr-title">📈 股票查詢</div>
      <div class="hdr-sub">輸入代號或公司名稱，簡單看懂今天的行情</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-time" id="clk">--:--</div>
      <div class="mkt-badge" id="mkt-badge"></div>
    </div>
  </div>
</div>

<div class="W">

  <!-- Search -->
  <div class="s-card">
    <div class="s-label">請輸入股票代號或公司名稱</div>
    <div class="s-row">
      <div class="s-wrap">
        <input class="s-inp" id="inp" type="text" inputmode="text"
               placeholder="2330、台積電、NVDA、Apple…" autocomplete="off" />
        <div class="dd" id="dd"></div>
      </div>
      <button class="s-btn" id="sbtn" onclick="doSearch()">查詢</button>
    </div>
    <div class="q-label">快速查詢</div>
    <div class="q-row" id="qrow"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>查詢中，請稍候…
  </div>

  <!-- Error -->
  <div class="err-box" id="errbox"></div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="p-card" id="pcrd"></div>

    <!-- K線圖 -->
    <div class="sec-t">📊 K 線走勢圖</div>
    <div style="background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:10px;">
      <div style="display:flex;gap:12px;margin-bottom:8px;font-size:11px;flex-wrap:wrap;" id="kline-legend">
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:20px;height:2px;background:#d0021b;display:inline-block"></span>MA5</span>
        <span style="display:flex;align-items:center;gap:4px;"><span style="width:20px;height:2px;background:#f59e0b;display:inline-block"></span>MA20</span>
        <span id="kline-color-hint" style="color:var(--dim)">🇹🇼 紅漲綠跌</span>
      </div>
      <canvas id="kline-canvas" style="width:100%;height:200px;display:block;border-radius:8px;"></canvas>
      <div id="kline-msg" style="text-align:center;padding:16px;font-size:13px;color:var(--dim);display:none">資料載入中…</div>
    </div>

    <!-- Pattern Recognition -->
    <div class="sec-t">📐 K 線型態辨識</div>
    <div id="pattern-box"></div>

    <div class="sec-t">技術訊號說明</div>
    <div class="lights" id="lights"></div>
    <div class="a-card neu" id="acrd">
      <div class="a-hdr">
        <div class="a-ico" id="aico">🔍</div>
        <div class="a-ttl neu" id="attl">整體解讀中…</div>
      </div>
      <div class="a-bdy" id="abdy">
        <div class="w-skel" style="margin-bottom:8px"></div>
        <div class="w-skel" style="width:80%;margin-bottom:8px"></div>
        <div class="w-skel" style="width:60%"></div>
      </div>
    </div>
    <div class="tip" id="tip"></div>
    <div class="disc">資料來源：台灣證交所 / Finnhub，盤中約延遲 5 分鐘。以上說明僅供參考，投資請自行判斷，風險自負。</div>
  </div>

  <!-- TW Watchlist -->
  <div class="w-hdr">
    <div class="w-title">🇹🇼 台股熱門</div>
    <div class="w-sub">點擊可查詢</div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#d0021b"></div>紅色＝上漲</div>
    <div class="leg-item"><div class="leg-dot" style="background:#007a3d"></div>綠色＝下跌</div>
  </div>
  <div class="w-grid" id="wgrid-tw"></div>

  <div class="sec-div"></div>

  <!-- US Watchlist -->
  <div class="w-hdr">
    <div class="w-title">🇺🇸 美股熱門</div>
    <div class="w-sub">點擊可查詢</div>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#007a3d"></div>綠色＝上漲</div>
    <div class="leg-item"><div class="leg-dot" style="background:#d0021b"></div>紅色＝下跌</div>
  </div>
  <div class="w-grid" id="wgrid-us"></div>

</div>

<script>
// ── 資料 ──────────────────────────────────────────────────────
const TW_WATCH = [
  {c:'2330',n:'台積電'},{c:'2317',n:'鴻海'},
  {c:'2454',n:'聯發科'},{c:'0050',n:'元大台灣50'},
  {c:'2382',n:'廣達'}, {c:'2412',n:'中華電'},
];
const US_WATCH = [
  {c:'NVDA',n:'NVIDIA'},{c:'AAPL',n:'Apple'},
  {c:'TSLA',n:'Tesla'},{c:'MSFT',n:'Microsoft'},
];
const QUICK = [
  {c:'2330',n:'台積電',m:'TW'},{c:'2317',n:'鴻海',m:'TW'},
  {c:'0050',n:'台灣50',m:'TW'},{c:'NVDA',n:'NVIDIA',m:'US'},
  {c:'AAPL',n:'Apple',m:'US'},{c:'TSLA',n:'Tesla',m:'US'},
];
// 台股清單：先放常見股票，背景靜默載入完整清單
let TW_DB = [
  {c:'2330',n:'台積電'},{c:'2317',n:'鴻海'},{c:'2454',n:'聯發科'},
  {c:'2308',n:'台達電'},{c:'2382',n:'廣達'},{c:'2412',n:'中華電'},
  {c:'2303',n:'聯電'},{c:'2327',n:'國巨'},{c:'2379',n:'瑞昱'},
  {c:'2357',n:'華碩'},{c:'3008',n:'大立光'},{c:'2207',n:'和泰車'},
  {c:'2912',n:'統一超'},{c:'1301',n:'台塑'},{c:'1303',n:'南亞'},
  {c:'2002',n:'中鋼'},{c:'2881',n:'富邦金'},{c:'2882',n:'國泰金'},
  {c:'2886',n:'兆豐金'},{c:'2891',n:'中信金'},{c:'2884',n:'玉山金'},
  {c:'0050',n:'元大台灣50'},{c:'0056',n:'元大高股息'},
  {c:'00878',n:'國泰永續高股息'},{c:'4938',n:'和碩'},
  {c:'2353',n:'宏碁'},{c:'2356',n:'英業達'},{c:'3711',n:'日月光投控'},
  {c:'6446',n:'藥華藥'},{c:'6263',n:'普萊德'},{c:'3045',n:'台灣大'},
  {c:'4904',n:'遠傳'},{c:'2498',n:'宏達電'},{c:'3481',n:'群創'},
];
let twListLoaded = false;

// 背景載入完整台股清單
async function loadTWList(){
  if(twListLoaded) return;
  try{
    const res = await fetch('/api/twse-list');
    const data = await res.json();
    if(data.ok && data.data.length > 100){
      TW_DB = data.data;
      twListLoaded = true;
    }
  }catch(_){}
}
// 頁面載入後 2 秒開始抓，不影響頁面速度
setTimeout(loadTWList, 2000);
const US_DB = [
  {c:'NVDA',n:'NVIDIA'},{c:'AAPL',n:'Apple'},{c:'MSFT',n:'Microsoft'},
  {c:'GOOGL',n:'Google Alphabet'},{c:'AMZN',n:'Amazon'},
  {c:'META',n:'Meta Facebook'},{c:'TSLA',n:'Tesla'},{c:'NFLX',n:'Netflix'},
  {c:'AMD',n:'AMD'},{c:'INTC',n:'Intel'},{c:'QCOM',n:'Qualcomm'},
  {c:'TSM',n:'台積電 TSMC ADR'},{c:'AVGO',n:'Broadcom'},
  {c:'V',n:'Visa'},{c:'MA',n:'Mastercard'},
  {c:'JPM',n:'JP Morgan'},{c:'BAC',n:'Bank of America'},
  {c:'WMT',n:'Walmart'},{c:'COST',n:'Costco'},
  {c:'DIS',n:'Disney'},{c:'SBUX',n:'Starbucks'},
  {c:'KO',n:'Coca-Cola'},{c:'SPY',n:'標普500 ETF'},
  {c:'QQQ',n:'那斯達克 ETF'},{c:'SOXX',n:'半導體 ETF'},
];

// ── Clock ─────────────────────────────────────────────────────
function tick(){ document.getElementById('clk').textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit'}); }
setInterval(tick,1000); tick();

// ── Market helpers ─────────────────────────────────────────────
function isTW(c){ return /^\d/.test(c.trim()); }
function setMarket(us){
  document.body.classList.toggle('us', us);
  document.getElementById('mkt-badge').textContent = us ? '🇺🇸 美股｜綠漲紅跌' : '🇹🇼 台股｜紅漲綠跌';
}
// 顏色永遠用固定色，不受 CSS var 影響（watchlist 需要各自顏色）
function twColor(pct){ return pct>0?'#d0021b':pct<0?'#007a3d':'#1a1a1a'; }
function usColor(pct){ return pct>0?'#007a3d':pct<0?'#d0021b':'#1a1a1a'; }
// 查詢結果使用 CSS var（會隨 body.us 切換）
function upDn(pct){ return pct>0?'up':pct<0?'dn':'neu'; }
function arrow(pct){ return pct>0?'▲':pct<0?'▼':'－'; }
function dotC(dot){ return dot==='red'?'#d0021b':dot==='green'?'#007a3d':'#c8840a'; }

// ── Quick pills ───────────────────────────────────────────────
document.getElementById('qrow').innerHTML = QUICK.map(q=>{
  const label = q.m==='US' ? `${q.n} (${q.c})` : `${q.c} ${q.n}`;
  return `<button class="q-btn" onclick="go('${q.c}')">${label}</button>`;
}).join('');

// ── Watchlist build ───────────────────────────────────────────
function buildGrid(list, gridId){
  const g = document.getElementById(gridId);
  list.forEach(w=>{
    const d=document.createElement('div');
    d.className='w-card'; d.id='wc-'+w.c;
    d.onclick=()=>go(w.c);
    d.innerHTML=`<div class="w-name">${w.n}</div><div class="w-code">${w.c}</div><div class="w-skel"></div>`;
    g.appendChild(d);
  });
}
buildGrid(TW_WATCH,'wgrid-tw');
buildGrid(US_WATCH,'wgrid-us');

function go(c){ document.getElementById('inp').value=c; dd.style.display='none'; doSearch(); }

// ── Autocomplete ──────────────────────────────────────────────
const inp = document.getElementById('inp');
const dd  = document.getElementById('dd');

function fuzzy(q){
  const ql=q.toLowerCase().trim();
  if(!ql)return[];
  const res=[];
  for(const s of TW_DB){
    if(s.c.startsWith(ql)||s.n.includes(q)||s.n.toLowerCase().includes(ql))
      res.push({...s,m:'TW'});
    if(res.length>=4)break;
  }
  for(const s of US_DB){
    if(res.length>=7)break;
    if(s.c.toLowerCase().startsWith(ql)||s.n.toLowerCase().includes(ql))
      res.push({...s,m:'US'});
  }
  return res.slice(0,7);
}

// ── Tech math ─────────────────────────────────────────────────
function calcRSI(c,p=14){
  if(c.length<p+1)return null;
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=c[i]-c[i-1];d>0?g+=d:l+=Math.abs(d);}
  let ag=g/p,al=l/p;
  for(let i=p+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(p-1)+(d>0?d:0))/p;al=(al*(p-1)+(d<0?Math.abs(d):0))/p;}
  return al===0?100:+(100-100/(1+ag/al)).toFixed(1);
}
function calcKD(h,l,c,p=9){
  if(c.length<p)return{k:50,d:50};
  let k=50,d=50;
  for(let i=p-1;i<c.length;i++){
    const sh=h.slice(i-p+1,i+1),sl=l.slice(i-p+1,i+1);
    const hh=Math.max(...sh),ll=Math.min(...sl);
    const rsv=hh===ll?50:((c[i]-ll)/(hh-ll))*100;
    k=(2/3)*k+(1/3)*rsv;d=(2/3)*d+(1/3)*k;
  }
  return{k:+k.toFixed(1),d:+d.toFixed(1)};
}
function ema(a,p){const k=2/(p+1);let e=a[0];for(let i=1;i<a.length;i++)e=a[i]*k+e*(1-k);return e;}
function mav(a,p){const s=a.slice(-p);return+(s.reduce((x,y)=>x+y,0)/s.length).toFixed(1);}

// ── Plain Chinese signals ─────────────────────────────────────
function iRSI(v){
  if(!v||v==='–')return{dot:'yellow',txt:'資料不足，無法判斷'};
  if(v>=80)return{dot:'red',txt:'漲太多了，很多人想賣出獲利，要小心追高'};
  if(v>=70)return{dot:'red',txt:'漲得有點過頭，短期可能會回跌喘口氣'};
  if(v>=50)return{dot:'red',txt:'目前漲勢正常，買方力道比較強'};
  if(v>=30)return{dot:'yellow',txt:'目前走勢普通，買賣雙方差不多'};
  return{dot:'green',txt:'跌得有點多，可能快要止跌反彈了'};
}
function iKD(k,d){
  if(k>80)return{dot:'red',txt:'漲勢可能快到頂，注意風險'};
  if(k<20)return{dot:'green',txt:'跌勢可能快到底，有反彈機會'};
  if(k>d) return{dot:'red',txt:'買方訊號出現，走勢開始往上'};
  return{dot:'green',txt:'賣方訊號出現，走勢偏向下跌'};
}
function iMACD(v){
  if(v===null)return{dot:'yellow',txt:'資料不足，無法計算'};
  if(v>2) return{dot:'red',txt:'上漲動能很強，漲勢持續中'};
  if(v>0) return{dot:'red',txt:'有一點上漲的力道，偏多方走勢'};
  if(v>-2)return{dot:'green',txt:'有一點下跌的力道，偏空方走勢'};
  return{dot:'green',txt:'下跌動能明顯，跌勢還在持續'};
}
function iMA(price,ma5,ma20){
  if(!ma5||!ma20)return{dot:'yellow',txt:'資料不足，無法計算'};
  if(price>ma5&&price>ma20&&ma5>ma20)return{dot:'red',txt:'短中期都在漲，是比較強的上升走勢'};
  if(price<ma5&&price<ma20&&ma5<ma20)return{dot:'green',txt:'短中期都在跌，是比較弱的下跌走勢'};
  if(price>ma5&&price>ma20)return{dot:'red',txt:'目前站在均線上方，走勢偏強'};
  if(price<ma5&&price<ma20)return{dot:'green',txt:'目前跌到均線下方，走勢偏弱'};
  return{dot:'yellow',txt:'走勢方向還不確定，觀望為主'};
}
function iVol(r){
  if(!r||r==='–')return{dot:'yellow',txt:'成交量資料不足'};
  if(r>=2)return{dot:'red',txt:`成交量是平常的 ${r} 倍，有大量資金進出，值得關注`};
  if(r>=1.3)return{dot:'yellow',txt:'成交量比平常多一些，市場有在動'};
  if(r>=0.7)return{dot:'yellow',txt:'成交量正常，市場沒有特別異動'};
  return{dot:'yellow',txt:'成交量偏少，市場觀望，買賣都不積極'};
}

// ── 型態辨識演算法 ────────────────────────────────────────────
function detectPatterns(closes, highs, lows, currentPrice) {
  const patterns = [];
  const n = closes.length;
  if (n < 20) return patterns;

  const recent = closes.slice(-20);
  const mid    = closes.slice(-40, -20);
  const ma5  = mav(closes, 5);
  const ma10 = mav(closes, 10);
  const ma20 = mav(closes, 20);

  const recentHigh = Math.max(...recent);
  const recentLow  = Math.min(...recent);
  const range      = recentHigh - recentLow;

  function localPeaks(arr, window=3) {
    const peaks=[], troughs=[];
    for(let i=window;i<arr.length-window;i++){
      const left=arr.slice(i-window,i), right=arr.slice(i+1,i+window+1);
      if(arr[i]>Math.max(...left)&&arr[i]>Math.max(...right)) peaks.push({i,v:arr[i]});
      if(arr[i]<Math.min(...left)&&arr[i]<Math.min(...right)) troughs.push({i,v:arr[i]});
    }
    return {peaks,troughs};
  }

  const full = closes.slice(-60);
  const {peaks, troughs} = localPeaks(full, 3);

  // W 底
  if(troughs.length>=2){
    const t1=troughs[troughs.length-2], t2=troughs[troughs.length-1];
    const midPeak=peaks.find(p=>p.i>t1.i&&p.i<t2.i);
    if(midPeak){
      const diff=Math.abs(t1.v-t2.v)/t1.v;
      if(diff<0.05&&midPeak.v>t1.v*1.03&&currentPrice>midPeak.v*0.97){
        patterns.push({cls:'bull',name:'W 底（雙底）',tag:'多方反轉',
          desc:'股價先跌到低點，小幅反彈後又再跌一次，但第二次沒跌破第一次的低點，形成像「W」一樣的形狀。這通常代表跌勢可能要結束，準備往上走。',
          warn:'若能明確突破頸線並放量，訊號更加可靠。'});
      }
    }
  }

  // M 頭
  if(peaks.length>=2){
    const p1=peaks[peaks.length-2], p2=peaks[peaks.length-1];
    const midTrough=troughs.find(t=>t.i>p1.i&&t.i<p2.i);
    if(midTrough){
      const diff=Math.abs(p1.v-p2.v)/p1.v;
      if(diff<0.05&&midTrough.v<p1.v*0.97&&currentPrice<midTrough.v*1.03){
        patterns.push({cls:'bear',name:'M 頭（雙頂）',tag:'空方反轉',
          desc:'股價漲到高點後回跌，再度反彈但沒超過上次高點，然後又往下，形成像「M」的形狀。這通常代表漲勢可能結束，注意下跌風險。',
          warn:'若股價跌破兩峰之間的谷底（頸線），是比較明確的賣出訊號。'});
      }
    }
  }

  // 頭肩頂
  if(peaks.length>=3){
    const [ls,head,rs]=peaks.slice(-3);
    if(head.v>ls.v&&head.v>rs.v&&Math.abs(ls.v-rs.v)/ls.v<0.06){
      const neckL=troughs.find(t=>t.i>ls.i&&t.i<head.i);
      const neckR=troughs.find(t=>t.i>head.i&&t.i<rs.i);
      if(neckL&&neckR&&currentPrice<Math.max(neckL.v,neckR.v)*1.02){
        patterns.push({cls:'bear',name:'頭肩頂',tag:'空方反轉',
          desc:'股價出現三個高點，中間那個最高（頭部），兩邊各一個較低（肩部）。這是相對強烈的下跌訊號，漲勢可能即將結束。',
          warn:'這個型態一旦確認，跌幅往往比較大，建議注意停損位置。'});
      }
    }
  }

  // 頭肩底
  if(troughs.length>=3){
    const [ls,head,rs]=troughs.slice(-3);
    if(head.v<ls.v&&head.v<rs.v&&Math.abs(ls.v-rs.v)/ls.v<0.06){
      const neckL=peaks.find(p=>p.i>ls.i&&p.i<head.i);
      const neckR=peaks.find(p=>p.i>head.i&&p.i<rs.i);
      if(neckL&&neckR&&currentPrice>Math.min(neckL.v,neckR.v)*0.98){
        patterns.push({cls:'bull',name:'頭肩底',tag:'多方反轉',
          desc:'股價出現三個低點，中間那個最低（頭部），兩邊各一個較高（肩部）。這是相對可靠的反彈訊號，跌勢可能即將結束。',
          warn:'突破頸線且成交量放大，才是比較確定的反轉訊號。'});
      }
    }
  }

  // 黃金交叉
  if(n>=11){
    const prevMA5  = mav(closes.slice(0,-1), 5);
    const prevMA10 = mav(closes.slice(0,-1), 10);
    if(prevMA5<=prevMA10&&ma5>ma10&&currentPrice>ma5){
      patterns.push({cls:'bull',name:'黃金交叉',tag:'多方訊號',
        desc:'短期均線（5日）從下方穿越長期均線（10日），這通常是短期行情轉強的訊號，代表近期買方力道增加。',
        warn:'黃金交叉訊號出現後，還需要成交量配合放大，效果才比較好。'});
    }
  }

  // 死亡交叉
  if(n>=11){
    const prevMA5  = mav(closes.slice(0,-1), 5);
    const prevMA10 = mav(closes.slice(0,-1), 10);
    if(prevMA5>=prevMA10&&ma5<ma10&&currentPrice<ma5){
      patterns.push({cls:'bear',name:'死亡交叉',tag:'空方訊號',
        desc:'短期均線（5日）從上方跌破長期均線（10日），這通常是短期行情轉弱的訊號，賣方力道開始增加。',
        warn:'死亡交叉之後，股價往往還會繼續下跌一段，要注意控制風險。'});
    }
  }

  // 突破新高
  if(n>=21){
    const prev20High=Math.max(...closes.slice(-21,-1));
    if(currentPrice>prev20High*1.01){
      patterns.push({cls:'bull',name:'突破近期高點',tag:'多方訊號',
        desc:'股價今天突破了過去 20 天的最高點，就像打破了一道牆。突破後往往會吸引更多買家進場，行情可能繼續往上走。',
        warn:'突破是否有效，要看成交量是否同步放大。若量不足，可能是假突破。'});
    }
  }

  // 跌破支撐
  if(n>=21){
    const prev20Low=Math.min(...closes.slice(-21,-1));
    if(currentPrice<prev20Low*0.99){
      patterns.push({cls:'bear',name:'跌破近期低點',tag:'空方訊號',
        desc:'股價今天跌破了過去 20 天的最低點，就像地板被打穿了。這可能引發更多人停損賣出，行情有繼續下跌的風險。',
        warn:'跌破支撐後通常會有一段跌勢，建議觀察成交量是否放大確認。'});
    }
  }

  // 上升趨勢
  if(!patterns.length&&n>=20){
    const first10avg=closes.slice(-20,-10).reduce((a,b)=>a+b,0)/10;
    const last10avg =closes.slice(-10).reduce((a,b)=>a+b,0)/10;
    if(last10avg>first10avg*1.03&&currentPrice>ma5&&ma5>ma20){
      patterns.push({cls:'bull',name:'上升趨勢',tag:'多方走勢',
        desc:'股價近期呈現穩定上漲的走勢，均線也整齊地由下往上排列，整體趨勢偏向樂觀。',
        warn:'趨勢向上不代表不會回檔，追高前記得注意買進的位置。'});
    }
  }

  // 下降趨勢
  if(!patterns.length&&n>=20){
    const first10avg=closes.slice(-20,-10).reduce((a,b)=>a+b,0)/10;
    const last10avg =closes.slice(-10).reduce((a,b)=>a+b,0)/10;
    if(last10avg<first10avg*0.97&&currentPrice<ma5&&ma5<ma20){
      patterns.push({cls:'bear',name:'下降趨勢',tag:'空方走勢',
        desc:'股價近期持續往下走，均線也呈現從高往低的排列，整體走勢偏弱。',
        warn:'下降趨勢中要特別小心，不要因為「感覺跌夠了」就輕易買進。'});
    }
  }

  // 箱型整理
  if(!patterns.length&&range/recentLow<0.08){
    patterns.push({cls:'neut',name:'箱型整理',tag:'盤整',
      desc:'股價在一個區間內上下來回震盪，沒有明確的方向。通常是在等待一個方向，等待突破或跌破。',
      warn:'盤整階段方向不明，建議等到明確突破後再做決定。'});
  }

  return patterns;
}

// 渲染型態
function renderPatterns(patterns, tw){
  const el = document.getElementById('pattern-box');
  if(!patterns.length){
    el.innerHTML=`<div class="pat-none">目前走勢資料不足（需要至少 20 個交易日數據），無法辨識型態。</div>`;
    return;
  }
  // 台股多方=紅，空方=綠；美股相反
  function patCls(cls){
    if(cls==='neut') return 'neut';
    if(tw) return cls==='bull'?'bull':'bear';
    return cls==='bull'?'bear':'bull'; // 美股顏色反轉
  }
  el.innerHTML = patterns.map(p => {
    const c = patCls(p.cls);
    return `<div class="pat-card ${c}">
      <div class="pat-name ${c}">
        ${p.name}
        <span class="pat-tag ${c}">${p.tag}</span>
      </div>
      <div class="pat-desc">${p.desc}</div>
      <div class="pat-warn">⚠️ ${p.warn}</div>
    </div>`;
  }).join('');
}

// ── K 線繪圖 ──────────────────────────────────────────────────
function drawKLine(closes, highs, lows, vols, dates, currentPrice, tw){
  const canvas = document.getElementById('kline-canvas');
  canvas.style.display = 'block';
  document.getElementById('kline-msg').style.display = 'none';

  const maxBars = 60;
  const start = Math.max(0, closes.length - maxBars);
  const C=[...closes.slice(start)], H=[...highs.slice(start)], L=[...lows.slice(start)];
  const D=[...(dates||[]).slice(start)];

  if(currentPrice && currentPrice !== C[C.length-1]){
    C.push(currentPrice);
    H.push(Math.max(currentPrice, H[H.length-1]||currentPrice));
    L.push(Math.min(currentPrice, L[L.length-1]||currentPrice));
    D.push('今日');
  }

  const n=C.length;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.parentElement.clientWidth-24||300;
  const TH=200;
  canvas.width=W*dpr; canvas.height=TH*dpr;
  canvas.style.width=W+'px'; canvas.style.height=TH+'px';

  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  const PAD={top:10,bottom:28,left:4,right:44};
  const cW=W-PAD.left-PAD.right, cH=TH-PAD.top-PAD.bottom;
  const pMax=Math.max(...H.filter(Boolean))*1.01;
  const pMin=Math.min(...L.filter(Boolean))*0.99;
  const pR=pMax-pMin||1;

  function py(p){ return PAD.top+cH*(1-(p-pMin)/pR); }
  const barGap=cW/n, barW=Math.max(1.5,barGap*0.6);

  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,TH);

  for(let i=0;i<=4;i++){
    const y=PAD.top+cH*(i/4);
    ctx.strokeStyle='#f0ede5'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(W-PAD.right,y); ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='9px sans-serif'; ctx.textAlign='right';
    ctx.fillText((pMax-pR*(i/4)).toFixed(1),W-2,y+3);
  }

  function calcMA(arr,p){ return arr.map((_,i)=>i<p-1?null:arr.slice(i-p+1,i+1).reduce((a,b)=>a+b,0)/p); }
  function drawLine(ma,color){
    ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=1.2; let s=false;
    ma.forEach((v,i)=>{ if(!v)return; const x=PAD.left+i*barGap+barGap/2; if(!s){ctx.moveTo(x,py(v));s=true;}else ctx.lineTo(x,py(v)); }); ctx.stroke();
  }

  const upC=tw?'#d0021b':'#007a3d', dnC=tw?'#007a3d':'#d0021b';
  C.forEach((close,i)=>{
    if(!close)return;
    const open=i===0?close:C[i-1], high=H[i]||close, low=L[i]||close;
    const x=PAD.left+i*barGap+barGap/2, isUp=close>=open, color=isUp?upC:dnC;
    ctx.strokeStyle=color; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,py(high)); ctx.lineTo(x,py(low)); ctx.stroke();
    ctx.fillStyle=color;
    ctx.fillRect(x-barW/2,py(Math.max(open,close)),barW,Math.max(1,py(Math.min(open,close))-py(Math.max(open,close))));
  });

  drawLine(calcMA(C,5),'#d0021b');
  drawLine(calcMA(C,20),'#f59e0b');

  ctx.fillStyle='#aaa'; ctx.font='9px sans-serif'; ctx.textAlign='center';
  const step=Math.ceil(n/6);
  D.forEach((d,i)=>{
    if(i%step!==0&&i!==n-1)return;
    ctx.fillText(d==='今日'?'今日':(d||'').slice(-5),PAD.left+i*barGap+barGap/2,TH-4);
  });
}

async function doSearch(){
  const sn=document.getElementById('inp').value.trim().toUpperCase();
  if(!sn)return;
  document.getElementById('inp').value=sn;
  dd.style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('result').style.display='none';
  document.getElementById('errbox').style.display='none';
  document.getElementById('sbtn').disabled=true;

  const tw=isTW(sn);
  setMarket(!tw);

  try{
    let q,C=[],H=[],L=[],V=[],dates=[];
    if(tw){
      // 抓報價 + 最近3個月歷史（確保有足夠K線數據）
      const qr = await fetch(`/api/quote/${sn}`);
      q = await qr.json();
      if(!q.ok) throw new Error(q.error||'查詢失敗，請確認台股代號是否正確');

      // 依序抓最近3個月，確保至少20筆
      const now = new Date();
      for(let delta=2; delta>=0; delta--){
        const d = new Date(now.getFullYear(), now.getMonth()-delta, 1);
        const ym = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}`;
        try{
          const hr = await fetch(`/api/history/${sn}?ym=${ym}`);
          const hd = await hr.json();
          const rows = hd.data||[];
          for(const r of rows){
            C.push(r.close); H.push(r.high); L.push(r.low); V.push(r.volume);
            dates.push(r.date);
          }
        }catch(_){}
        if(C.length >= 20) break;
      }
    } else {
      // 美股：同時抓報價 + 歷史K線
      const [qr, hr] = await Promise.all([
        fetch(`/api/quote-us/${sn}`),
        fetch(`/api/history-us/${sn}`)
      ]);
      q = await qr.json();
      if(!q.ok) throw new Error(q.error||'查詢失敗，請確認美股代號是否正確（如 NVDA、AAPL）');

      const hd = await hr.json();
      const rows = hd.data || [];
      C = rows.map(r=>r.close);
      H = rows.map(r=>r.high);
      L = rows.map(r=>r.low);
      V = rows.map(r=>r.volume);
      dates = rows.map(r=>r.date);
    }

    const aC=[...C,q.price],aH=[...H,q.high||q.price],aL=[...L,q.low||q.price];
    const rv=C.length>14?calcRSI(aC):null;
    const {k,d}=C.length>9?calcKD(aH,aL,aC):{k:50,d:50};
    const ma5=C.length>=5?mav(aC,5):null,ma20=C.length>=20?mav(aC,20):null;
    const mc=aC.length>=26?+(ema(aC,12)-ema(aC,26)).toFixed(2):null;
    const avgV=V.slice(-20).reduce((a,b)=>a+b,0)/Math.max(1,V.slice(-20).length);
    const vr=avgV>0?+(q.volume/avgV).toFixed(1):'–';
    const cls=upDn(q.changePct);
    const cur=q.currency||'TWD';

    // Price card
    document.getElementById('pcrd').innerHTML=`
      <div class="p-meta">
        <div class="p-name">${q.name}</div>
        <div class="p-code">${q.code}</div>
        <div class="p-ex">${q.exchange}${cur!=='TWD'?' · '+cur:''}</div>
      </div>
      <div class="p-main">
        <div class="p-num ${cls}">${q.price.toLocaleString('en',{maximumFractionDigits:2})}</div>
        <div>
          <div class="p-chg ${cls}">${arrow(q.changePct)} ${Math.abs(q.change).toFixed(2)}</div>
          <div class="p-chg ${cls}">${q.changePct>0?'+':''}${q.changePct}%</div>
        </div>
      </div>
      <div class="p-grid">
        <div class="p-cell"><div class="p-cl">開盤</div><div class="p-cv">${q.open||'–'}</div></div>
        <div class="p-cell"><div class="p-cl">最高</div><div class="p-cv" style="color:var(--up)">${q.high||'–'}</div></div>
        <div class="p-cell"><div class="p-cl">最低</div><div class="p-cv" style="color:var(--dn)">${q.low||'–'}</div></div>
      </div>`;

    // Lights
    const ri=iRSI(rv),ki=iKD(k,d),mi=iMACD(mc),mai=iMA(q.price,ma5,ma20),vi=iVol(vr);
    document.getElementById('lights').innerHTML=[
      {lbl:'💹 漲跌動能',...ri},{lbl:'📉 買賣訊號',...ki},
      {lbl:'⚡ 趨勢力道',...mi},{lbl:'📏 均線位置',...mai},
      {lbl:'🔊 成交量',...vi},
    ].map(l=>`
      <div class="l-row">
        <div class="l-dot" style="background:${dotC(l.dot)};box-shadow:0 0 6px ${dotC(l.dot)}55"></div>
        <div><div class="l-lbl">${l.lbl}</div><div class="l-txt">${l.txt}</div></div>
      </div>`).join('');

    document.getElementById('loading').style.display='none';
    document.getElementById('result').style.display='block';
    document.getElementById('tip').style.display='none';

    // K線圖
    const hint = document.getElementById('kline-color-hint');
    if(hint) hint.textContent = tw ? '🇹🇼 紅漲綠跌' : '🇺🇸 綠漲紅跌';

    if(C.length >= 5){
      drawKLine(C, H, L, V, dates, q.price, tw);
    } else {
      document.getElementById('kline-msg').style.display='block';
      document.getElementById('kline-canvas').style.display='none';
      document.getElementById('kline-msg').textContent='歷史資料不足，無法繪製K線圖';
    }

    // 型態辨識
    if(C.length >= 20){
      const patterns = detectPatterns(aC, aH, aL, q.price);
      renderPatterns(patterns, tw);
    } else {
      document.getElementById('pattern-box').innerHTML=
        `<div class="pat-none">需要至少 20 個交易日數據才能辨識型態（目前取得 ${C.length} 筆）。</div>`;
    }

    fetchAI(q,{rv,k,d,mc,ma5,ma20,vr,riT:ri.txt,kiT:ki.txt,miT:mi.txt,maiT:mai.txt,viT:vi.txt,tw});
  }catch(e){
    document.getElementById('loading').style.display='none';
    const eb=document.getElementById('errbox');
    eb.textContent='❌ '+e.message;
    eb.style.display='block';
  }finally{
    document.getElementById('sbtn').disabled=false;
  }
}

// ── AI analysis ───────────────────────────────────────────────
async function fetchAI(q,ind){
  const cls=upDn(q.changePct);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',max_tokens:500,
        system:`你是幫助台灣長輩看懂股票的助理。用非常口語、溫和的白話文說明，像鄰居朋友聊天。不用數字或術語。不給買賣建議。
輸出純JSON：{"icon":"一個表情","title":"今天這支股票一句話（15字內）","summary":"2-3句話說明今天整體狀況","tip":"下單前一個溫和提醒（一句話）","signal":"UP或DOWN或FLAT"}`,
        messages:[{role:'user',content:
          `${q.name}(${q.code})今天${q.changePct>0?'上漲':'下跌'}${Math.abs(q.changePct)}%${ind.tw?'（台股）':'（美股）'}。
漲跌動能：${ind.riT}
買賣訊號：${ind.kiT}
趨勢力道：${ind.miT}
均線位置：${ind.maiT}
成交量：${ind.viT}
請用白話文整理給長輩聽。`}]
      })
    });
    const data=await res.json();
    const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const m=txt.match(/\{[\s\S]*?\}/);
    if(!m)throw new Error('parse');
    const ai=JSON.parse(m[0]);
    const sc={UP:'up',DOWN:'dn',FLAT:'neu'}[ai.signal]||'neu';
    document.getElementById('acrd').className='a-card '+sc;
    document.getElementById('aico').textContent=ai.icon||(q.changePct>0?'📈':q.changePct<0?'📉':'📊');
    const at=document.getElementById('attl');
    at.textContent=ai.title||'整體分析';
    at.className='a-ttl '+sc;
    document.getElementById('abdy').innerHTML=(ai.summary||'').split(/[。\n]/).filter(Boolean).map(p=>`<p>${p.trim()}。</p>`).join('');
    if(ai.tip){
      const tp=document.getElementById('tip');
      tp.innerHTML=`<strong>⚠️ 下單前提醒：</strong>${ai.tip}`;
      tp.style.display='block';
    }
  }catch(_){
    const cls2=upDn(q.changePct);
    document.getElementById('acrd').className='a-card '+cls2;
    document.getElementById('aico').textContent=q.changePct>0?'📈':q.changePct<0?'📉':'📊';
    const at=document.getElementById('attl');
    at.textContent=q.changePct>0?'今天走勢偏強':q.changePct<0?'今天走勢偏弱':'今天小幅震盪';
    at.className='a-ttl '+cls2;
    document.getElementById('abdy').innerHTML=
      `<p>${q.name}今天${q.changePct>0?'上漲':'下跌'} ${Math.abs(q.changePct)}%。</p>
       <p>${ind.maiT}</p><p>${ind.viT}</p>`;
  }
}

// ── Load watchlists ───────────────────────────────────────────
(async()=>{
  // 台股批次
  try{
    const res=await fetch(`/api/multi?stocks=${TW_WATCH.map(w=>w.c).join(',')}`);
    const data=await res.json();
    if(data.ok) data.data.forEach(q=>{
      const el=document.getElementById('wc-'+q.code);
      if(!el)return;
      const c=twColor(q.changePct);
      el.querySelector('.w-skel').outerHTML=
        `<div class="w-price" style="color:${c}">${q.price.toLocaleString()}</div>
         <div class="w-chg" style="color:${c}">${q.changePct>0?'▲':'▼'} ${q.changePct>0?'+':''}${q.changePct}%</div>`;
    });
  }catch(_){}

  // 美股逐一查（避免 rate limit）
  for(const w of US_WATCH){
    try{
      const res=await fetch(`/api/quote-us/${w.c}`);
      const q=await res.json();
      if(!q.ok)continue;
      const el=document.getElementById('wc-'+w.c);
      if(!el)continue;
      const c=usColor(q.changePct);
      el.querySelector('.w-skel').outerHTML=
        `<div class="w-price" style="color:${c}">${q.price.toLocaleString('en',{maximumFractionDigits:2})}</div>
         <div class="w-chg" style="color:${c}">${q.changePct>0?'▲':'▼'} ${q.changePct>0?'+':''}${q.changePct}%</div>`;
    }catch(_){}
    await new Promise(r=>setTimeout(r,400));
  }
})();
